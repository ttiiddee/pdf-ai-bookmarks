<vbox onload="PDFAIBookmarks_Preferences.init()">
    <linkset>
        <html:link rel="localization" href="pdf-ai-bookmarks.ftl" />
    </linkset>

    <html:style>
        #pdf-ai-bookmarks-api-key { width: 100%; }
    </html:style>

    <groupbox>
        <label>
            <html:h2>Gemini API Configuration</html:h2>
        </label>

        <hbox align="center">
            <label value="API Key:" control="pdf-ai-bookmarks-api-key" style="width: 80px;" />
            <html:input id="pdf-ai-bookmarks-api-key" type="password" placeholder="Enter your Gemini API key"
                preference="extensions.pdf-ai-bookmarks.apiKey" />
        </hbox>

        <description style="color: gray; font-size: 0.9em; margin-top: 5px;">
            Get your API key from: https://aistudio.google.com/app/apikey
        </description>
    </groupbox>

    <groupbox>
        <label>
            <html:h2>Options</html:h2>
        </label>

        <checkbox id="pdf-ai-bookmarks-polish" label="Polish existing bookmarks (if present)"
            preference="extensions.pdf-ai-bookmarks.polish" />
    </groupbox>
</vbox>
